# Perfil DESKTOP: app standalone numa unica maquina, banco H2 em arquivo local.
# Dados em ~/.sgpur (persistem independente de onde o app foi instalado).
# Backup = copiar a pasta ~/.sgpur.
spring:
  datasource:
    url: jdbc:h2:file:${user.home}/.sgpur/db/sgpur;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

app:
  anexos:
    dir: ${user.home}/.sgpur/anexos
