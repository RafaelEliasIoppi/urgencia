<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Auditoria')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <h1 class="h3 mb-3">Auditoria</h1>
    <p class="text-muted small">Registro das acoes realizadas no sistema (quem, o que e quando).</p>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                <tr><th>Data/hora</th><th>Usuario</th><th>Acao</th><th>Detalhe</th></tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs.content}">
                    <td class="small text-nowrap"
                        th:text="${#temporals.format(log.dataHora, 'dd/MM/yyyy HH:mm:ss')}">data</td>
                    <td th:text="${log.usuario}">usuario</td>
                    <td><span class="badge bg-secondary" th:text="${log.acao}">ACAO</span></td>
                    <td class="small" th:text="${log.detalhe}">detalhe</td>
                </tr>
                <tr th:if="${logs.empty}">
                    <td colspan="4" class="text-center text-muted py-4">Nenhum registro de auditoria.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${totalPaginas > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/auditoria(page=${paginaAtual - 1})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">
                    <span th:text="${paginaAtual + 1}">1</span> / <span th:text="${totalPaginas}">1</span>
                </span>
            </li>
            <li class="page-item" th:classappend="${paginaAtual + 1 >= totalPaginas} ? 'disabled'">
                <a class="page-link" th:href="@{/auditoria(page=${paginaAtual + 1})}">Proxima</a>
            </li>
        </ul>
    </nav>
</div>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
