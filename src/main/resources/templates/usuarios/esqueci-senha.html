<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Esqueci minha senha')}"></head>
<body class="bg-light">
<div class="container" style="max-width: 400px; margin-top: 8vh;">
    <div class="text-center mb-4">
        <i class="bi bi-droplet-half text-primary" style="font-size: 3rem;"></i>
        <h1 class="h4 mt-2">SGPUR</h1>
        <p class="text-muted small">Redefinir senha</p>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${sucesso}" class="alert alert-success py-2" th:text="${msgRedefinicao}"></div>
            <div th:if="${erroRedefinicao}" class="alert alert-danger py-2" th:text="${erroRedefinicao}"></div>
            <p class="text-muted small mb-3" th:unless="${sucesso}">
                Informe seu login para receber uma senha temporaria.
                Apos o login, troque a senha na edicao do seu perfil.
            </p>
            <form th:action="@{/usuarios/esqueci-senha}" method="post" th:unless="${sucesso}">
                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" name="username" class="form-control" autofocus required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Redefinir senha</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-muted small">Voltar ao login</a>
            </div>
        </div>
    </div>
</div>
<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
